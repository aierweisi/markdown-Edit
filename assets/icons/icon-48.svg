<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d5af1"/>
      <stop offset="100%" stop-color="#2541c4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.92" stdDeviation="2.88" flood-color="#1a2a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Drop shadow layer -->
  <rect x="4" y="5.4399999999999995" width="40" height="40" rx="11" fill="#1a2a8a" opacity="0.25" filter="url(#shadow)"/>

  <!-- Main background -->
  <rect x="4" y="4" width="40" height="40" rx="11" fill="url(#bg)"/>

  <!-- Inner shine -->
  <rect x="4" y="4" width="40" height="20" rx="11" fill="url(#shine)"/>

  <!-- "M" letter -->
  <text
    x="24"
    y="26.880000000000003"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="20.16"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.48"
    opacity="1"
  >M</text>

  <!-- Down-arrow accent (↓ symbol) — small, bottom-right -->
  <text
    x="35.04"
    y="37.92"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="10.56"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.85"
  >↓</text>

  <!-- Subtle border -->
  <rect x="4" y="4" width="40" height="40" rx="11" fill="none" stroke="white" stroke-width="0.5760000000000001" stroke-opacity="0.15"/>
</svg>