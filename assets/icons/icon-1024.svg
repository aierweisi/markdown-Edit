<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d5af1"/>
      <stop offset="100%" stop-color="#2541c4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="40.96" stdDeviation="61.44" flood-color="#1a2a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Drop shadow layer -->
  <rect x="82" y="112.72" width="860" height="860" rx="225" fill="#1a2a8a" opacity="0.25" filter="url(#shadow)"/>

  <!-- Main background -->
  <rect x="82" y="82" width="860" height="860" rx="225" fill="url(#bg)"/>

  <!-- Inner shine -->
  <rect x="82" y="82" width="860" height="430" rx="225" fill="url(#shine)"/>

  <!-- "M" letter -->
  <text
    x="512"
    y="573.44"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="430.08"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-10.24"
    opacity="1"
  >M</text>

  <!-- Down-arrow accent (↓ symbol) — small, bottom-right -->
  <text
    x="747.52"
    y="808.96"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="225.28"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.85"
  >↓</text>

  <!-- Subtle border -->
  <rect x="82" y="82" width="860" height="860" rx="225" fill="none" stroke="white" stroke-width="12.288" stroke-opacity="0.15"/>
</svg>