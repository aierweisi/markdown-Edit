<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d5af1"/>
      <stop offset="100%" stop-color="#2541c4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10.24" stdDeviation="15.36" flood-color="#1a2a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Drop shadow layer -->
  <rect x="20" y="27.68" width="216" height="216" rx="56" fill="#1a2a8a" opacity="0.25" filter="url(#shadow)"/>

  <!-- Main background -->
  <rect x="20" y="20" width="216" height="216" rx="56" fill="url(#bg)"/>

  <!-- Inner shine -->
  <rect x="20" y="20" width="216" height="108" rx="56" fill="url(#shine)"/>

  <!-- "M" letter -->
  <text
    x="128"
    y="143.36"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="107.52"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-2.56"
    opacity="1"
  >M</text>

  <!-- Down-arrow accent (↓ symbol) — small, bottom-right -->
  <text
    x="186.88"
    y="202.24"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="56.32"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.85"
  >↓</text>

  <!-- Subtle border -->
  <rect x="20" y="20" width="216" height="216" rx="56" fill="none" stroke="white" stroke-width="3.072" stroke-opacity="0.15"/>
</svg>