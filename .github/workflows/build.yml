name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon
        run: |
          mkdir -p assets/icons.iconset
          sips -z 16 16     assets/icons/icon-1024.svg --out assets/icons.iconset/icon_16x16.png 2>/dev/null || \
          cp assets/icons/icon-16.png assets/icons.iconset/icon_16x16.png
          cp assets/icons/icon-32.png assets/icons.iconset/icon_16x16@2x.png
          cp assets/icons/icon-32.png assets/icons.iconset/icon_32x32.png
          cp assets/icons/icon-64.png assets/icons.iconset/icon_32x32@2x.png
          cp assets/icons/icon-128.png assets/icons.iconset/icon_128x128.png
          cp assets/icons/icon-256.png assets/icons.iconset/icon_128x128@2x.png
          cp assets/icons/icon-256.png assets/icons.iconset/icon_256x256.png
          cp assets/icons/icon-512.png assets/icons.iconset/icon_256x256@2x.png
          cp assets/icons/icon-512.png assets/icons.iconset/icon_512x512.png
          cp assets/icons/icon-512.png assets/icons.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icons.iconset -o assets/icons/icon.icns
          echo "icon.icns generated"

      - name: Build Mac app
        run: npm run build -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
          retention-days: 30
